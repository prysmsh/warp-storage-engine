# Foundation Storage Engine Configuration
storage:
  provider: filesystem
  filesystem:
    base_dir: "/data/storage"
    bucket_mapping:
      warehouse: warehouse
      samples: samples
      connectors: connectors
      spark: spark
      ray: ray
      schemas: schemas
      vault: vault
      kubeaccess-logs: kubeaccess-logs
      qdrant: qdrant

# SECURITY WARNING: This is a development configuration file
auth:
  type: none

# OPA Configuration (disabled by default, enable via environment variables)
opa:
  enabled: false
  url: "http://localhost:8181"
  timeout: "5s"

server:
  listen: ":8080"

logging:
  level: info
  format: json

rate_limit:
  enabled: false

tls:
  enabled: false

ui:
  enabled: true
  base_path: "/ui"
